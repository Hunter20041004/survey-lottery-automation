<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Survey lottery workflow</title>
  <desc id="desc">Synthetic CSV passes through validation, seeded draw, audit record, and dry-run preview.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#17264a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#87a8ff"/>
    </marker>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <text x="64" y="64" fill="#f7f9ff" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700">Privacy-safe lottery pipeline</text>
  <text x="64" y="95" fill="#aebddd" font-family="Inter,Arial,sans-serif" font-size="16">One deterministic path from synthetic input to auditable output</text>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(55 140)">
      <rect width="190" height="130" rx="18" fill="#17223d" stroke="#35528b"/>
      <circle cx="36" cy="36" r="16" fill="#50d5b7"/>
      <text x="62" y="43" fill="#f7f9ff" font-size="18" font-weight="700">Synthetic CSV</text>
      <text x="24" y="82" fill="#aebddd" font-size="14">Opaque participant IDs</text>
      <text x="24" y="105" fill="#aebddd" font-size="14">No contact fields</text>
    </g>
    <g transform="translate(285 140)">
      <rect width="190" height="130" rx="18" fill="#17223d" stroke="#35528b"/>
      <circle cx="36" cy="36" r="16" fill="#ffca6a"/>
      <text x="62" y="43" fill="#f7f9ff" font-size="18" font-weight="700">Validation</text>
      <text x="24" y="82" fill="#aebddd" font-size="14">Schema and booleans</text>
      <text x="24" y="105" fill="#aebddd" font-size="14">Unique, nonblank IDs</text>
    </g>
    <g transform="translate(515 140)">
      <rect width="190" height="130" rx="18" fill="#17223d" stroke="#557ee6"/>
      <circle cx="36" cy="36" r="16" fill="#87a8ff"/>
      <text x="62" y="43" fill="#f7f9ff" font-size="18" font-weight="700">Seeded draw</text>
      <text x="24" y="82" fill="#aebddd" font-size="14">Eligible pool only</text>
      <text x="24" y="105" fill="#aebddd" font-size="14">No repeated winner</text>
    </g>
    <g transform="translate(745 140)">
      <rect width="190" height="130" rx="18" fill="#17223d" stroke="#35528b"/>
      <circle cx="36" cy="36" r="16" fill="#c792ea"/>
      <text x="62" y="43" fill="#f7f9ff" font-size="18" font-weight="700">Audit JSON</text>
      <text x="24" y="82" fill="#aebddd" font-size="14">Seed, counts, digest</text>
      <text x="24" y="105" fill="#aebddd" font-size="14">ID-only traceability</text>
    </g>
    <g transform="translate(975 140)">
      <rect width="170" height="130" rx="18" fill="#17223d" stroke="#35528b"/>
      <circle cx="36" cy="36" r="16" fill="#ff809f"/>
      <text x="62" y="43" fill="#f7f9ff" font-size="18" font-weight="700">Dry-run</text>
      <text x="24" y="82" fill="#aebddd" font-size="14">Local preview</text>
      <text x="24" y="105" fill="#aebddd" font-size="14">Zero network calls</text>
    </g>
  </g>
  <g stroke="#87a8ff" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M250 205H276"/>
    <path d="M480 205H506"/>
    <path d="M710 205H736"/>
    <path d="M940 205H966"/>
  </g>
  <text x="64" y="325" fill="#7f91b7" font-family="Inter,Arial,sans-serif" font-size="14">Every public artifact uses synthetic data and passes an automated secret scan.</text>
</svg>
